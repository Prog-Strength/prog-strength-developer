name: Terraform Apply

# Runs on every push to main (i.e. after a PR merges) and on manual
# dispatch. Applies the persistent infrastructure — launch template,
# IAM, VPC, secrets, CloudWatch log group. Worker instances themselves
# are launched separately via dispatch-sow.yml, which passes sow_path
# to instantiate the count-gated aws_instance.worker resource.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  # Shared with dispatch-sow.yml so apply-on-merge and SOW dispatches
  # serialize through the same state lock instead of racing.
  group: terraform-apply-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  TF_VERSION: 1.10.5
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=prog-strength-developer/${TF_STATE_ENV:-prod}/terraform.tfstate"

      - name: terraform apply
        working-directory: terraform
        # Workers are no longer Terraform-managed (dispatch-sow.yml
        # launches them via aws ec2 run-instances), so this apply only
        # touches persistent infra: VPC, IAM, launch template, log
        # group, secrets, and the developer manager.
        #
        # The manager's Grafana admin credentials are sensitive and
        # come from GitHub repo secrets (mirrored from prog-strength-api
        # so monitoring.* and developers.* share one password). A
        # missing secret resolves to empty string here, which matches
        # the Terraform variable's empty default — so an apply before
        # the mirror simply ships with the compose default of admin/admin.
        env:
          TF_VAR_grafana_admin_user:     ${{ secrets.GRAFANA_ADMIN_USER }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: terraform apply -auto-approve
