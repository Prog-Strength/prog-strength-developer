name: Dispatch ticket

on:
  workflow_dispatch:
    inputs:
      # Input key stays `sow_path` deliberately: this is a hand-invoked
      # workflow, and renaming the key would break muscle memory and any
      # saved dispatches for no functional gain. It accepts either work
      # type — the worker routes on the ticket's `type:` frontmatter.
      sow_path:
        description: "Path to a SOW (sows/foo.md) or DX (dx/foo.md) ticket within prog-strength-docs"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

# NO concurrency group. Concurrent dispatches are the entire point of
# this revision — the manager + per-instance metrics make running
# multiple workers in parallel safe and observable. The soft fleet cap
# below is the budget guardrail; the SG/IAM/dashboard story is the
# correctness guardrail.

env:
  AWS_REGION: us-east-2
  # Soft fleet cap. Raise via a one-line PR if you genuinely need more
  # concurrent workers; the value is here so a runaway dispatch loop
  # fails loudly before it burns dollars.
  FLEET_CAP: 10

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Python tooling for the `fleet` control-plane package. The dispatch
      # gate (acquire/attach) is a thin call into it — the locking logic
      # lives in code, not this workflow.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync fleet dependencies
        run: uv sync

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fleet cap check
        run: |
          COUNT=$(aws ec2 describe-instances \
            --filters 'Name=tag:Name,Values=prog-strength-developer-worker' \
                      'Name=instance-state-name,Values=pending,running' \
            --query 'length(Reservations[].Instances[])' --output text)
          echo "Active workers: $COUNT (cap: $FLEET_CAP)"
          if [ "$COUNT" -ge "$FLEET_CAP" ]; then
            echo "::error::Fleet cap reached ($COUNT >= $FLEET_CAP). Refusing to dispatch."
            exit 1
          fi

      # Per-SOW gate. Acquire the SOW lock BEFORE launching anything, so a
      # SOW already being built by another worker costs zero compute to
      # refuse. Exit code 3 == already in progress (distinct from a real
      # error); the conditional write in DynamoDB makes this race-free even
      # if two dispatches fire at once.
      - name: Acquire SOW lock
        id: acquire
        env:
          SOW_PATH: ${{ inputs.sow_path }}
        run: |
          set +e
          uv run python -m fleet acquire \
            --sow "$SOW_PATH" \
            --dispatch-id "$GITHUB_RUN_ID" \
            --dispatched-by "$GITHUB_ACTOR"
          code=$?
          set -e
          if [ "$code" -eq 3 ]; then
            echo "::error::A worker is already building '$SOW_PATH'. Refusing to dispatch a duplicate. Use 'fleet release --force' once it finishes if this is wrong."
            exit 1
          fi
          exit "$code"

      - name: Resolve persistent infra IDs
        id: infra
        run: |
          LT_ID=$(aws ec2 describe-launch-templates \
            --filters 'Name=launch-template-name,Values=prog-strength-developer-worker' \
            --query 'LaunchTemplates[0].LaunchTemplateId' --output text)
          if [ -z "$LT_ID" ] || [ "$LT_ID" = "None" ]; then
            echo "::error::Launch template prog-strength-developer-worker not found. Has terraform apply completed?"
            exit 1
          fi
          MGR_PRIVATE_IP=$(aws ec2 describe-instances \
            --filters 'Name=tag:Name,Values=prog-strength-developer-manager' \
                      'Name=instance-state-name,Values=running' \
            --query 'Reservations[].Instances[].PrivateIpAddress' --output text)
          if [ -z "$MGR_PRIVATE_IP" ]; then
            echo "::error::Manager instance not running. Cannot dispatch worker without it (Pushgateway + Promtail target)."
            exit 1
          fi
          echo "launch_template_id=$LT_ID" >> "$GITHUB_OUTPUT"
          echo "manager_private_ip=$MGR_PRIVATE_IP" >> "$GITHUB_OUTPUT"

      - name: Render userdata
        id: userdata
        env:
          SOW_PATH: ${{ inputs.sow_path }}
          MGR_PRIVATE_IP: ${{ steps.infra.outputs.manager_private_ip }}
        run: |
          # bootstrap/userdata.sh.tpl carries TWO kinds of placeholder:
          # 1) Terraform's ${name} for runtime values we substitute here
          # 2) Terraform's $${...} escape for literal ${...} that bash
          #    must see at runtime (e.g. $${INSTANCE_ID:-})
          # When templatefile() renders the launch-template's baked
          # userdata it handles both. Here we substitute by hand, so the
          # render must:
          #   a) replace ${name} with workflow inputs
          #   b) replace literal $${ with $ (the Terraform unescape)
          python3 - "$GITHUB_OUTPUT" <<'PY'
          import os, sys, base64, gzip
          src = open("bootstrap/userdata.sh.tpl").read()
          subs = {
              "aws_region": os.environ.get("AWS_REGION", "us-east-2"),
              "sow_path": os.environ["SOW_PATH"],
              "github_org": "Prog-Strength",
              "log_group_name": "/aws/ec2/prog-strength-developer",
              "max_runtime_hours": "6",
              "claude_secret_name": "prog-strength-developer/claude-credentials",
              "github_app_secret_name": "prog-strength-developer/github-app",
              "manager_private_ip": os.environ["MGR_PRIVATE_IP"],
          }
          for k, v in subs.items():
              src = src.replace("${" + k + "}", v)
          # Terraform's $${ escape -> literal ${ that bash should see.
          src = src.replace("$${", "${")
          encoded = base64.b64encode(gzip.compress(src.encode())).decode()
          with open(sys.argv[1], "a") as f:
              f.write(f"user_data_b64={encoded}\n")
          PY

      - name: Run instance
        id: run
        env:
          LT_ID: ${{ steps.infra.outputs.launch_template_id }}
          USER_DATA: ${{ steps.userdata.outputs.user_data_b64 }}
          SOW_PATH: ${{ inputs.sow_path }}
        run: |
          IID=$(aws ec2 run-instances \
            --launch-template "LaunchTemplateId=$LT_ID,Version=\$Latest" \
            --user-data "$USER_DATA" \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=prog-strength-developer-worker},{Key=SOW,Value=$SOW_PATH}]" \
            --query 'Instances[0].InstanceId' --output text)
          echo "instance_id=$IID" >> "$GITHUB_OUTPUT"

      # Record the launched instance on the lock this dispatch already
      # holds. Guarded server-side on dispatch_id, so it only patches our
      # own reservation. Non-fatal: if it fails, the lock still blocks
      # duplicates (just without the instance id recorded), and the worker
      # releases by SOW on finalize.
      - name: Attach instance to lock
        continue-on-error: true
        env:
          SOW_PATH: ${{ inputs.sow_path }}
          IID: ${{ steps.run.outputs.instance_id }}
        run: |
          uv run python -m fleet attach \
            --sow "$SOW_PATH" \
            --dispatch-id "$GITHUB_RUN_ID" \
            --instance-id "$IID"

      - name: Summary
        env:
          SOW_PATH: ${{ inputs.sow_path }}
          IID: ${{ steps.run.outputs.instance_id }}
        run: |
          SOW_SLUG=$(basename "$SOW_PATH" .md | tr -c 'A-Za-z0-9._-' '_' | sed 's/_*$//')
          PREFIX="$SOW_SLUG/$IID"
          LOG_GROUP="/aws/ec2/prog-strength-developer"
          TAIL_CMD="aws logs tail $LOG_GROUP --region $AWS_REGION --log-stream-names $PREFIX/claude --follow --format short"
          {
            echo "## Worker dispatched"
            echo ""
            echo "- **SOW:** \`$SOW_PATH\`"
            echo "- **Instance ID:** \`$IID\`"
            echo ""
            echo "### Live dashboard"
            echo "<https://developers.progstrength.fitness/d/developer-platform>"
            echo ""
            echo "### CloudWatch log streams"
            echo "- \`$PREFIX/claude\` — Claude's live progress"
            echo "- \`$PREFIX/userdata\` — bootstrap script progress"
            echo "- \`$PREFIX/cloud-init\` — cloud-init's own output"
            echo ""
            echo "### Tail Claude's live output locally"
            echo "Paste into your terminal to follow this run alongside the dashboard."
            echo "Requires AWS creds with \`logs:FilterLogEvents\` on \`$LOG_GROUP\`."
            echo '```bash'
            echo "$TAIL_CMD"
            echo '```'
            echo ""
            echo "Swap \`$PREFIX/claude\` for \`$PREFIX/userdata\` to follow the bootstrap script,"
            echo "or pass all three to \`--log-stream-names\` to interleave them."
            echo ""
            echo "### SSM into the worker"
            echo '```bash'
            echo "aws ssm start-session --target $IID"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Also surface the tail command in the live job log so the
          # operator can grab it the moment dispatch finishes without
          # opening the Summary tab.
          echo "::group::Tail Claude's live CloudWatch output"
          echo "$TAIL_CMD"
          echo "::endgroup::"

      # If we acquired the lock but never launched an instance (a later
      # step failed before run-instances), free the SOW now instead of
      # waiting for the TTL — otherwise a transient failure would block
      # re-dispatch for hours. Scoped to run.outcome != 'success' so we
      # NEVER release a lock whose worker is actually alive: once the
      # instance is launched, that worker owns the SOW and releases it
      # itself on finalize.
      - name: Release lock on failed dispatch
        if: ${{ failure() && steps.acquire.outcome == 'success' && steps.run.outcome != 'success' }}
        env:
          SOW_PATH: ${{ inputs.sow_path }}
        run: |
          echo "Dispatch failed before a worker launched; releasing the SOW lock."
          uv run python -m fleet release \
            --sow "$SOW_PATH" \
            --instance-id none \
            --outcome error \
            --force
