name: Dispatch SOW

on:
  workflow_dispatch:
    inputs:
      sow_path:
        description: "Path to the SOW within prog-strength-docs (e.g. sows/foo.md)"
        required: true
        type: string

permissions:
  id-token: write   # for AWS OIDC federation
  contents: read

concurrency:
  # Shared with apply.yml so SOW dispatches and apply-on-merge
  # serialize through the same state lock instead of racing.
  group: terraform-apply-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  TF_VERSION: 1.10.5
  # Set in repo Variables (not Secrets — non-sensitive).
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # workflow runs Terraform then exits; never long
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preflight — no in-flight worker
        run: ./scripts/preflight.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform
        # backend.tf uses use_lockfile = true (Terraform 1.10+ S3 native
        # locking), so no DynamoDB lock table is needed at runtime.
        # TF_STATE_BUCKET and AWS_REGION are workflow env vars; ${VAR}
        # is bash variable expansion, NOT a GitHub expression — GH only
        # interprets ${{ ... }} so a single `$` here is correct.
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform apply
        working-directory: terraform
        # Pass sow_path via TF_VAR_ env var rather than a shell-quoted
        # -var flag to close the command-injection vector that the
        # inline ${{ inputs.sow_path }} interpolation would otherwise
        # open. Terraform reads TF_VAR_sow_path automatically.
        env:
          TF_VAR_sow_path: ${{ inputs.sow_path }}
        run: terraform apply -auto-approve

      - name: Summary
        # Pass sow_path via env (NOT inline ${{ }}) to keep it out of the
        # shell command string. The slug derivation here must match the
        # one in bootstrap/userdata.sh.tpl: basename .md, then non-safe
        # chars to '_', then trim trailing underscores. Keep both copies
        # in sync if you change one.
        env:
          SOW_PATH: ${{ inputs.sow_path }}
        run: |
          INSTANCE_ID=$(cd terraform && terraform output -raw worker_instance_id)
          SOW_SLUG=$(basename "$SOW_PATH" .md | tr -c 'A-Za-z0-9._-' '_' | sed 's/_*$//')
          PREFIX="$SOW_SLUG/$INSTANCE_ID"
          LOG_GROUP="/aws/ec2/prog-strength-developer"
          {
            echo "## Worker dispatched"
            echo ""
            echo "- **SOW:** \`$SOW_PATH\`"
            echo "- **Instance ID:** \`$INSTANCE_ID\`"
            echo ""
            echo "### CloudWatch log streams"
            echo "- \`$PREFIX/claude\` — Claude's live progress (recommended for watching)"
            echo "- \`$PREFIX/userdata\` — bootstrap script progress"
            echo "- \`$PREFIX/cloud-init\` — cloud-init's own output"
            echo ""
            echo "### Tail Claude live"
            echo '```bash'
            echo "aws logs tail $LOG_GROUP \\"
            echo "  --log-stream-names $PREFIX/claude \\"
            echo "  --follow"
            echo '```'
            echo ""
            echo "### SSM into the worker"
            echo '```bash'
            echo "aws ssm start-session --target $INSTANCE_ID"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
